<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photobooth - Angel & EJ</title>

  <link rel="stylesheet" href="CSS/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YB1XW29840"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YB1XW29840');
  </script>

  <style>
    /* Grid Layout */
    .gallery {
      padding: 2rem 1rem;
      max-width: 1200px;
      margin: auto;
    }

    .gallery h2 {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #5a3e2b;
      margin-bottom: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .grid img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .grid img:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    #lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1000;
    }

    #lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    #lightbox.show {
      opacity: 1;
      pointer-events: auto;
    }

    #lightbox span {
      position: absolute;
      top: 50%;
      font-size: 3rem;
      color: white;
      cursor: pointer;
      user-select: none;
      padding: 0 1rem;
      transform: translateY(-50%);
      z-index: 1001;
    }

    #prev { left: 20px; }
    #next { right: 20px; }
  </style>
</head>

<body>
  <header>
    <h1>Angel & EJ</h1>
    <p>February 11, 2026</p>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="pictures.html">Pictures</a></li>
        <li><a href="video.html">Video</a></li>
        <li><a href="photobooth.html">Photobooth</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="gallery">
      <h2>Photobooth</h2>
      <div class="grid" id="gallery"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 Angel & EJ</p>
  </footer>

  <div id="lightbox">
    <span id="prev">&#10094;</span>
    <img src="" alt="Enlarged Photo">
    <span id="next">&#10095;</span>
  </div>

  <script>
    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = lightbox.querySelector('img');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');

    let photosArray = [];
    let currentIndex = 0;

    fetch('photobooth.json')
      .then(res => res.json())
      .then(photos => {
        photosArray = photos;
        photos.forEach((photo, index) => {
          const img = document.createElement('img');
          img.src = `photobooth/${photo}`;
          img.alt = photo.replace(/[-_]/g, ' ').replace(/\.\w+$/, '');
          gallery.appendChild(img);

          img.addEventListener('click', () => {
            currentIndex = index;
            lightboxImg.src = img.src;
            lightbox.classList.add('show');
          });
        });
      })
      .catch(err => console.error('Failed to load images:', err));

    function showPhoto(index) {
      if (index < 0) index = photosArray.length - 1;
      if (index >= photosArray.length) index = 0;
      currentIndex = index;
      lightboxImg.src = `photobooth/${photosArray[currentIndex]}`;
    }

    nextBtn.addEventListener('click', () => showPhoto(currentIndex + 1));
    prevBtn.addEventListener('click', () => showPhoto(currentIndex - 1));

    lightbox.addEventListener('click', e => {
      if (e.target === lightboxImg || e.target === prevBtn || e.target === nextBtn) return;
      lightbox.classList.remove('show');
    });

    document.addEventListener('keydown', e => {
      if (e.key === "Escape") lightbox.classList.remove('show');
      if (e.key === "ArrowRight") showPhoto(currentIndex + 1);
      if (e.key === "ArrowLeft") showPhoto(currentIndex - 1);
    });
  </script>
</body>
</html>
