<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Moment</title>

  <!-- Main CSS -->
  <link rel="stylesheet" href="CSS/style.css">

  <!-- Elegant Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YB1XW29840"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YB1XW29840');
  </script>

  <style>
    body {
      background: linear-gradient(to bottom, #fdfaf6, #f6efe8);
    }

    main {
      padding: 4rem 1rem;
      text-align: center;
      font-family: 'Roboto', sans-serif;
    }

    main h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      color: #5a3e2b;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }

    .subtitle {
      color: #b08a6a;
      font-size: 1rem;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }

    .video-wrapper {
      position: relative;
      width: 90%;
      max-width: 1000px;
      margin: auto;
      aspect-ratio: 16 / 9;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 
        0 20px 50px rgba(0,0,0,0.15),
        0 0 0 1px rgba(212,175,125,0.3);
      animation: fadeInVideo 1.2s ease forwards;
      opacity: 0;
      transform: translateY(25px);
      background: #000;
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-wrapper::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 22px;
      box-shadow: inset 0 0 40px rgba(212,175,125,0.15);
      pointer-events: none;
    }

    @keyframes fadeInVideo {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.9rem;
      color: #a67c52;
      border-top: 1px solid #e8dfd6;
      background: #fff;
    }

    @media (max-width: 768px) {
      main h2 {
        font-size: 2rem;
      }

      .video-wrapper {
        border-radius: 16px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Angel & EJ</h1>
    <p>February 11, 2026</p>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="pictures.html">Pictures</a></li>
        <li><a href="video.html">Video</a></li>
        <li><a href="photobooth.html">Photobooth</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="videos">
      <h2>Our Moment</h2>
      <p class="subtitle">A celebration of love and laughter.</p>

      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/SipF-o4NOZk?rel=0&modestbranding=1"
          title="Angel and EJ Wedding celebration"
          allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Angel & EJ — All Rights Reserved</p>
  </footer>

</body>
</html>
